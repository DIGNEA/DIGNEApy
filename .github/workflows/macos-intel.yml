name: macos-intel

on:
    push:
        branches: "**"
    pull_request:
        branches: "**"

jobs:
    macos-latest-build:
        strategy:
            matrix:
                python-version: ["3.12", "3.13", "3.14"]

        uses: ./.github/workflows/build-app.yml
        with:
            os: macos-26-intel
            python-version: ${{ matrix.python-version }}
