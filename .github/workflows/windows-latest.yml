name: windows-latest

on:
    push:
        branches: "**"
    pull_request:
        branches: "**"

jobs:
    windows-latest-build:
        strategy:
            matrix:
                python-version: ["3.12", "3.13", "3.14"]
        uses: ./.github/workflows/build-app.yml
        with:
            os: windows-latest
            python-version: ${{ matrix.python-version }}
